name: Publish Extension

on:
  push:
    tags:
      - 'vscode-*'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install -g ovsx
      - run: ovsx publish -p ${{ secrets.OPENVSX_TOKEN }}
        working-directory: packages/vscode