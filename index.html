<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simple.js Playground</title>
<link rel="icon" type="image/png" href="simplejs.png">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Inter,system-ui,sans-serif;background:#0B1120;color:#E2E8F0;min-height:100vh;padding:20px}
h1{text-align:center;color:#fff;margin:20px 0}
.playground{display:grid;grid-template-columns:1fr 1fr;gap:12px;max-width:1200px;margin:0 auto}
@media(max-width:768px){.playground{grid-template-columns:1fr}}
.panel{background:#131B2E;border:1px solid #1E2D4A;border-radius:12px;overflow:hidden}
.panel-header{padding:10px 14px;background:#1A2540;font-size:12px;color:#64748B;border-bottom:1px solid #1E2D4A}
textarea{width:100%;height:350px;background:transparent;color:#E2E8F0;border:none;padding:14px;font-family:monospace;font-size:13px;outline:none;resize:vertical}
button{padding:10px 20px;margin:4px;border-radius:8px;border:none;font-weight:600;cursor:pointer}
.btn-blue{background:#3B82F6;color:#fff}
.btn-cyan{background:#06B6D4;color:#000}
.btn-dark{background:#1E293B;color:#94A3B8}
.actions{text-align:center;padding:10px}
footer{text-align:center;color:#64748B;padding:30px;font-size:13px}
</style>
</head>
<body>
<h1>Simple.js Playground</h1>
<div class="actions">
<button class="btn-blue" onclick="compile()">Compile</button>
<button class="btn-cyan" onclick="run()">Run</button>
<button class="btn-dark" onclick="copy()">Copy</button>
</div>
<div class="playground">
<div class="panel">
<div class="panel-header">Simple.js</div>
<textarea id="in">name = "World"
greet() { "Hello " + name }
log@console(greet())</textarea>
</div>
<div class="panel">
<div class="panel-header">JavaScript</div>
<textarea id="out" readonly></textarea>
</div>
</div>
<footer>Simple.js — JavaScript, gentle.</footer>
<script>
function compile(s){var r=[],d=0,l=s.split('\n');for(var i=0;i<l.length;i++){var t=l[i].trim();if(!t||t.startsWith('//')){r.push('');continue}if(t.includes('@console')){var m=t.match(/(\w+)@console\((.+)\)/);if(m){r.push('  '.repeat(d)+'console.'+m[1]+'('+m[2]+');');continue}}if(t.match(/^\w+\(.*\)\s*\{/)&&!t.includes('@')){var f=t.match(/^(\w+)\(([^)]*)\)\s*\{/);if(f){var b=t.match(/\{\s*(.+)\s*\}/);if(b){r.push('  '.repeat(d)+'function '+f[1]+'('+f[2]+'){');r.push('  '.repeat(d+1)+'return '+b[1]+';');r.push('  '.repeat(d)+'}')}else{r.push('  '.repeat(d)+'function '+f[1]+'('+f[2]+'){');d++}continue}}if(t==='}'){d=Math.max(0,d-1);r.push('  '.repeat(d)+'}');continue}if(t.includes(' = ')){var a=t.split(' = '),ls=a[0].trim(),ac=r.join('\n'),pa=ls.includes('[')||ls.includes('.'),vn=ls.split('[')[0].split('.')[0].trim(),ad=ac.includes('let '+vn+' =')||ac.includes('function '+vn),kw=(!pa&&!ad)?'let ':'';r.push('  '.repeat(d)+kw+a[0]+' = '+a[1]+';');continue}if(t.startsWith('if ')){var c=t.replace('if ','').replace(':','').replace('{','').trim();r.push('  '.repeat(d)+'if ('+c+'){');d++;continue}if(t.startsWith('for ')&&t.includes(' in ')){var fl=t.replace(/:$/,''),fm=fl.match(/for (\w+)(?:, (\w+))? in (.+)/);if(fm){var it=fm[1],ix=fm[2]||null,ir=fm[3];if(ix){r.push('  '.repeat(d)+'for (let '+ix+' = 0; '+ix+' < '+ir+'.length; '+ix+'++){');r.push('  '.repeat(d+1)+'let '+it+' = '+ir+'['+ix+'];')}else{r.push('  '.repeat(d)+'for (let '+it+' of '+ir+'){')}d++;continue}}if(t.startsWith('ret ')){r.push('  '.repeat(d)+'return '+t.replace('ret ','')+';');continue}if(t.includes('+')&&t.includes('"')){r.push('  '.repeat(d)+'return '+t+';');continue}if(t.match(/^\w+\(.*\)$/)){r.push('  '.repeat(d)+t+';');continue}r.push('  '.repeat(d)+t+';')}while(d>0){d--;r.push('  '.repeat(d)+'}')}return r.join('\n')}
var inp=document.getElementById('in'),out=document.getElementById('out');
function doCompile(){out.value=compile(inp.value)}
function doRun(){try{var r=[];(new Function('console',out.value))({log:function(){r.push([].join.call(arguments,' '))}});alert(r.length?r.join('\n'):'Done')}catch(e){alert(e.message)}}
function doCopy(){navigator.clipboard.writeText(out.value);alert('Copied')}
inp.addEventListener('input',doCompile);
doCompile();
</script>
</body>
</html>
